<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Claire</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #f4c400;
      font-family: 'Gill Sans', 'Trebuchet MS', sans-serif;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
      letter-spacing: -0.02em;
    }

    #timer {
      font-size: clamp(1.6rem, 3.2vw, 4.3rem);
      line-height: 1.18;
      max-width: 95vw;
      font-weight: 400;
    }

    /* Desktop: all phrases inline, one line */
    .phrase {
      display: inline;
      white-space: nowrap;
    }

    small {
      position: absolute;
      bottom: 1.2rem;
      font-size: clamp(0.65rem, 1vw, 0.9rem);
      letter-spacing: -0.01em;
    }

    /* Mobile: each phrase gets its own line, font scales to fill width */
    @media (max-width: 768px) {
      #timer {
        font-size: clamp(1.4rem, 10vw, 3.2rem);
        line-height: 1.3;
        width: 100%;
      }

      .phrase {
        display: block;
      }

      small {
        bottom: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <div id="timer" aria-live="off"></div>
  <small>* based on an estimate of 2 March 2025 at 5:55 pm</small>

  <script>
    // Set the reference time here — include UTC offset to avoid timezone ambiguity
    const startTime = new Date('2025-03-02T17:55:00+00:00');

    function updateTimer() {
      const now = new Date();
      let temp = new Date(startTime);

      let years = now.getFullYear() - temp.getFullYear();
      temp.setFullYear(temp.getFullYear() + years);
      if (temp > now) {
        years--;
        temp.setFullYear(temp.getFullYear() - 1);
      }

      let remainingMs = now - temp;
      const weeks = Math.floor(remainingMs / (1000 * 60 * 60 * 24 * 7));
      temp.setDate(temp.getDate() + weeks * 7);
      remainingMs = now - temp;

      const days = Math.floor(remainingMs / (1000 * 60 * 60 * 24));
      temp.setDate(temp.getDate() + days);
      remainingMs = now - temp;

      const hours = Math.floor(remainingMs / (1000 * 60 * 60));
      temp.setHours(temp.getHours() + hours);
      remainingMs = now - temp;

      const minutes = Math.floor(remainingMs / (1000 * 60));
      temp.setMinutes(temp.getMinutes() + minutes);
      remainingMs = now - temp;

      const seconds = Math.floor(remainingMs / 1000);

      const units = [
        [years,   'year'],
        [weeks,   'week'],
        [days,    'day'],
        [hours,   'hour'],
        [minutes, 'minute'],
        [seconds, 'second']
      ].filter(([v]) => v !== 0);

      const timerEl = document.getElementById('timer');

      if (units.length === 0) {
        timerEl.innerHTML = '<span class="phrase">...0 seconds...*</span>';
        return;
      }

      // Build each phrase as its own <span class="phrase">
      // Punctuation: comma after all but last; "and" before last; asterisk on last
      const spans = units.map(([value, unit], i) => {
        const label = `${value} ${unit}${value === 1 ? '' : 's'}`;
        const isFirst = i === 0;
        const isLast  = i === units.length - 1;
        const isSole  = units.length === 1;

        let text;
        if (isSole) {
          text = `...${label}...*`;
        } else if (isFirst) {
          text = `...${label},`;
        } else if (isLast) {
          text = `and ${label}...*`;
        } else {
          text = `${label},`;
        }

        // On desktop these are inline so we need a space between spans;
        // on mobile each is block so the space is invisible but harmless.
        return `<span class="phrase">${text}</span>`;
      });

      timerEl.innerHTML = spans.join(' ');
    }

    function scheduleNext() {
      const now = Date.now();
      const msUntilNextSecond = 1000 - (now % 1000);
      setTimeout(() => {
        updateTimer();
        scheduleNext();
      }, msUntilNextSecond);
    }

    updateTimer();
    scheduleNext();
  </script>
</body>
</html>
